version: 2
updates:
  # Dépendances npm
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      # Regroupe les mises à jour mineures/patch en une seule PR pour limiter le bruit
      minor-and-patch:
        update-types:
          - minor
          - patch

  # Actions GitHub utilisées par la CI
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - github-actions
