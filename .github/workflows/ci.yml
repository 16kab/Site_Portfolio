name: CI

on:
  push:
    branches: [main]
  pull_request:

# Annule les exécutions obsolètes sur une même branche/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Qualité (types, lint, tests, build, budget)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Vérification des types
        run: npm run typecheck
      - name: Lint (Biome)
        run: npm run lint
      - name: Formatage (Biome)
        run: npm run format:check
      - name: Tests unitaires
        run: npx vitest run
      - name: Build de production
        run: npm run build
      - name: Vérification du pré-rendu (meta de partage)
        run: npm run check:prerender
      - name: Budget de bundle
        run: npm run budget

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Installation du navigateur
        run: npx playwright install --with-deps chromium
      - name: Tests E2E
        run: npm run test:e2e
      - name: Rapport Playwright
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # Job consultatif (non requis) : mesure Web Vitals / a11y / SEO sur le build.
  # Les scores perf varient selon le runner → performance et best-practices en
  # avertissement ; accessibilité et SEO en erreur (on les maîtrise).
  lighthouse:
    name: Lighthouse (consultatif)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Build de production
        run: npm run build
      - name: Audit Lighthouse
        run: npx lhci autorun

  # Régression visuelle : compare le rendu aux captures de référence. Sur
  # windows-latest, plateforme des références (-win32) — même moteur de rendu,
  # polices auto-hébergées identiques. Consultatif au départ (le temps de
  # confirmer la stabilité runner vs local), à promouvoir en requis ensuite.
  visual:
    name: Régression visuelle (consultatif)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Installation du navigateur
        run: npx playwright install chromium
      - name: Tests de régression visuelle
        run: npm run test:visual
      - name: Rapport (diffs visuels)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: visual-report
          path: playwright-report/
          retention-days: 7
